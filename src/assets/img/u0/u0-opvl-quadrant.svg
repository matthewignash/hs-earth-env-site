   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #1a1a2e" x="323.9208" y="70.0803" transform="rotate(-0 323.9208 70.0803)">PURPOSE</text>
   </g>
   <g id="text_6">
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #4f4f4f" transform="translate(275.9328 120.836086)">Why does it exist,</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #4f4f4f" transform="translate(275.9328 134.833352)">and for whom?</text>
   </g>
