   </g>
   <g id="text_3">
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #4f4f4f" transform="translate(43.191 120.836086)">Who made this, when —</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #4f4f4f" transform="translate(43.191 134.833352)">and what kind of thing is it?</text>
   </g>
