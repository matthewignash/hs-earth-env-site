   </g>
   <g id="text_9">
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #4f4f4f" transform="translate(43.191 283.152086)">What is it genuinely</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #4f4f4f" transform="translate(43.191 297.149352)">good for answering?</text>
   </g>
